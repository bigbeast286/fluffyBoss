<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet Vaccination Form</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-section {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
      text-transform: capitalize;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input,
    select,
    textarea {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #74ebd5;
      box-shadow: 0 0 5px rgba(116, 235, 213, 0.6);
    }

    textarea {
      resize: none;
      min-height: 80px;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      background: linear-gradient(135deg, #74ebd5, #4facfe);
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
    }

    button:active {
      transform: scale(0.98);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="form-section">
    <h2>Pet Vaccination</h2>

    <form id="vaccinationForm">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="text" placeholder="Pet Name" required>

      <select required>
        <option value="">Select Pet Type</option>
        <option>Dog</option>
        <option>Cat</option>
        <option>Cow</option>
      </select>

      <input type="tel" placeholder="Phone Number" required>
      <input type="date" required>

      <textarea placeholder="Describe your pet’s issue..."></textarea>

      <button type="submit">Submit Now</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("vaccinationForm");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      alert("🐾 Vaccination form submitted successfully!");
      form.reset();
    });
  </script>
</body>
</html>
